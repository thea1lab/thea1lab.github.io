############################# Default Parameters ##########################
[params]
logo = "images/logo.png"
logo2 = "images/full-logo.png"
# Meta data
description = "A1 Lab — Laboratório de experimentação tecnológica. Pesquisamos, experimentamos e entregamos protótipos funcionais e planos técnicos para resolver seus desafios de negócio."
author = "A1 Lab"
images = ["images/full-background-logo.png"]
# Google Analytics
google_analytics_id = "G-384Q987MKZ"
# post share
post_share = false

# preloader
[params.preloader]
enable = true
preloader = "images/logo.png"

# cookies
[params.cookies]
enable = false
expire_days = 2

