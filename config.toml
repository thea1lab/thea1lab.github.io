################################# Default configuration ###################
baseURL = "https://www.a1lab.com.br"
title = "A1 Lab"
theme = "meghna"
themesDir = "./themes"
# post excerpt
summaryLength = "15"
# disable language
disableLanguages = []
defaultContentLanguage = "en"
disableKinds = ["taxonomy", "term"]

[markup.goldmark.extensions.typographer]
apostrophe = "'"
leftAngleQuote = "\""
leftDoubleQuote = "\""
leftSingleQuote = "'"
rightAngleQuote = "\""
rightDoubleQuote = "\""
rightSingleQuote = "'"
disable = false
[markup.goldmark.renderer]
unsafe = true
disableAliases = true

[pagination]
pagerSize = 7

############################# Plugins ##########################
# css plugins
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.min.css"
[[params.plugins.css]]
link = "plugins/themify-icons/themify-icons.css"
[[params.plugins.css]]
link = "plugins/magnific-popup/magnific-popup.css"
[[params.plugins.css]]
link = "plugins/slick/slick.css"
[[params.plugins.css]]
link = "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"

# js plugins
[[params.plugins.js]]
link = "plugins/jquery/jquery.min.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
[[params.plugins.js]]
link = "plugins/slick/slick.min.js"
[[params.plugins.js]]
link = "plugins/shuffle/shuffle.min.js"
[[params.plugins.js]]
link = "plugins/magnific-popup/jquery.magnific-popup.min.js"
[[params.plugins.js]]
link = "plugins/lazy-load/lozad.min.js"

