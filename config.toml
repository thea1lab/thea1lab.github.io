################################# Default configuration ###################
baseURL = "https://www.a1lab.com.br"
title = "A1 Lab"
theme = "meghna"
themesDir = "./themes"
# post excerpt
summaryLength = "15"
# disable language
disableLanguages = []
defaultContentLanguage = "pt"
# post pagination
paginate = "7"
[pagination]
disableAliases = true

############################# Plugins ##########################
