############################# Default Parameters ##########################
[params]
logo = "images/full-background-logo.webp"
logo2 = "images/full-logo.png"
# Meta data
description = "A1 Lab - Laboratório de experimentação tecnológica. Pesquisamos, experimentamos e entregamos protótipos funcionais e planos técnicos para resolver seus desafios de negócio."
author = "A1 Lab"
images = ["images/full-background-logo.webp"]
# Google Analytics
google_analytics_id = "G-384Q987MKZ"
# post share
post_share = false

# preloader
[params.preloader]
enable = true
preloader = "images/full-background-logo.webp"

# turnstile captcha
[params.turnstile]
site_key = "0x4AAAAAACqpSTTxUQkMNCtC"

# cookies
[params.cookies]
enable = false
expire_days = 2

# organization structured data
[params.organization]
foundingDate = "2024"
numberOfEmployees_min = 2
numberOfEmployees_max = 10
areaServed = ["Worldwide"]
knowsAbout = [
  "Software Engineering",
  "API Integration",
  "Process Automation",
  "Document Processing",
  "Artificial Intelligence",
  "Machine Learning",
  "LLM Pipelines",
  "RAG",
  "Chatbots"
]
contactEmail = "contato@a1lab.com.br"
contactType = "customer service"
availableLanguage = ["Portuguese", "English"]

