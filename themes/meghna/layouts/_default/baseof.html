<!DOCTYPE html>
<html lang="{{ with site.LanguageCode }}{{ . }}{{ else }}en-us{{ end }}">
{{ partial "head.html" . }}

<body id="body" data-spy="scroll" data-target=".navbar" data-offset="55">
  <a href="#content" class="skip-to-content sr-only">{{ i18n "skip_to_content" | default "Skip to content" }}</a>
  <div id="content">
    {{ partial "preloader.html" . }}
    <main>
    {{- block "main" . }}{{- end }}
    </main>
  </div>
  {{- partial "footer.html" . -}}
</body>

</html>
