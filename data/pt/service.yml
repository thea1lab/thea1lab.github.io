################################# Service #################################
service:
  enable: true
  title: Nossos Serviços
  service_item:
    - name: Diagnóstico Rápido
      icon: ti-search
      content: "Entendemos o problema real do seu negócio e mapeamos onde a tecnologia pode gerar resultado. Você recebe um relatório com oportunidades concretas e próximos passos claros."
      duration: "1–2 semanas"

    - name: Protótipo Funcional
      icon: ti-rocket
      content: "Testamos as tecnologias na prática e entregamos um protótipo funcionando — você vê a solução rodando, não uma apresentação. É a forma mais rápida de saber se a ideia funciona."
      duration: "2–6 semanas"

    - name: Plano Técnico para Decisão
      icon: ti-settings
      content: "Você recebe um plano completo para tomar a melhor decisão: o que fazer, quais tecnologias usar, quanto custa e quanto tempo leva. Tudo baseado no que testamos no protótipo."
      duration: "Incluso no experimento"
