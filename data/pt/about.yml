  title: Sobre Nós
  about_item:
    - icon: ti-light-bulb # themify icon pack : https://themify.me/themify-icons
      title: Pensamento <span class="color">Criativo</span>
      content: "Não seguimos o caminho óbvio. Na A1 Lab, pensamos de forma diferente — buscamos soluções alternativas, olhamos para o futuro e desafiamos o convencional. É um jeito criativo e divertido de trabalhar, mas com a seriedade e a disciplina que resultados de verdade exigem."

    - icon: ti-briefcase # themify icon pack : https://themify.me/themify-icons
      title: IA com <span class="color">Propósito</span>
      content: "Inteligência artificial não é um buzzword para nós — é parte natural do nosso trabalho. Integramos IA de forma inteligente e deliberada, como ferramenta que potencializa a engenharia, gera valor concreto e entrega resultados mensuráveis. Sem exageros, sem promessas vazias."

    - icon: ti-comments # themify icon pack : https://themify.me/themify-icons
      title: O <span class="color">A1 Way</span>
      content: "A1 é o nível mais alto. É uma filosofia de excelência que combina criatividade, engenharia de qualidade e inteligência artificial integrada ao dia a dia. Compartilhamos conhecimento abertamente, contribuímos para a comunidade e construímos soluções com integridade e transparência. Esse é o jeito A1."
